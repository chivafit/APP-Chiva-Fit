name: Bling Sync (Cron)

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Modo de execução'
        required: true
        default: 'persist'
        type: choice
        options:
          - persist
          - reprocess_items
      limit:
        description: 'Tamanho do lote (limit) usado no reprocessamento'
        required: false
        default: '50'
        type: string
      concurrency:
        description: 'Concorrência do reprocessamento'
        required: false
        default: '6'
        type: string
      max_batches:
        description: 'Máximo de lotes por execução'
        required: false
        default: '200'
        type: string
  schedule:
    - cron: '*/30 * * * *'

concurrency:
  group: bling-cron-sync
  cancel-in-progress: false

env:
  SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
  CRON_SECRET: ${{ secrets.CRON_SECRET }}

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Prepare
        id: prep
        env:
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -z "${SUPABASE_PROJECT_ID:-}" ] || [ -z "${CRON_SECRET:-}" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Secrets ausentes; job será ignorado (skipped)."
            exit 0
          fi
          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Validate secrets
        if: steps.prep.outputs.ready == 'true'
        env:
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$SUPABASE_PROJECT_ID" ]; then
            echo "Missing SUPABASE_PROJECT_ID secret"
            exit 1
          fi
          if [ -z "$CRON_SECRET" ]; then
            echo "Missing CRON_SECRET secret"
            exit 1
          fi
          if echo "$SUPABASE_PROJECT_ID" | grep -qiE 'https?://|supabase\.co'; then
            echo "SUPABASE_PROJECT_ID must be the project ref only (ex: nvbicjjtnobnnscmypeq), not a URL"
            exit 1
          fi
          if ! echo "$SUPABASE_PROJECT_ID" | grep -qE '^[a-z0-9]{20}$'; then
            echo "SUPABASE_PROJECT_ID looks invalid. Expected 20 lowercase alnum chars."
            echo "Got length: ${#SUPABASE_PROJECT_ID}"
            exit 1
          fi
          if [ "${#CRON_SECRET}" -lt 20 ]; then
            echo "CRON_SECRET looks too short. Use a long random value."
            echo "Got length: ${#CRON_SECRET}"
            exit 1
          fi

      - name: Trigger bling-sync (persist)
        if: steps.prep.outputs.ready == 'true'
        env:
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          MODE: ${{ inputs.mode }}
          LIMIT: ${{ inputs.limit }}
          CONCURRENCY: ${{ inputs.concurrency }}
          MAX_BATCHES: ${{ inputs.max_batches }}
        run: |
          set -euo pipefail
          
          # ============================================================================
          # CONFIGURATION
          # ============================================================================
          BASE="https://${SUPABASE_PROJECT_ID}.supabase.co/functions/v1"
          mode="${MODE:-persist}"
          limit="${LIMIT:-50}"
          concurrency="${CONCURRENCY:-6}"
          max_batches="${MAX_BATCHES:-80}"
          
          # Retry configuration
          MAX_RETRIES=3
          INITIAL_BACKOFF=2
          REQUEST_TIMEOUT=30
          
          if [ "${GITHUB_EVENT_NAME}" != "workflow_dispatch" ]; then
            mode="persist"
            max_batches="80"
          fi
          
          # ============================================================================
          # STRUCTURED LOGGING
          # ============================================================================
          log_json() {
            local level="$1"
            shift
            local message="$*"
            local timestamp
            timestamp="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
            printf '{"timestamp":"%s","level":"%s","message":"%s"}\n' "${timestamp}" "${level}" "${message}" >&2
          }
          
          log_batch() {
            local batch="$1"
            local count="$2"
            local items="$3"
            local has_more="$4"
            local next_offset="$5"
            local timestamp
            timestamp="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
            printf '{"timestamp":"%s","level":"info","type":"batch_summary","batch":%d,"count":%d,"items":%d,"hasMore":%s,"nextOffset":"%s"}\n' \
              "${timestamp}" "${batch}" "${count}" "${items}" "${has_more}" "${next_offset}" >&2
          }
          
          log_json "info" "Workflow started: mode=${mode}, limit=${limit}, concurrency=${concurrency}, max_batches=${max_batches}"
          
          # ============================================================================
          # PAYLOAD PREPARATION
          # ============================================================================
          if [ "${mode}" = "reprocess_items" ]; then
            payload="$(python3 -c 'import json,sys; limit=sys.argv[1]; conc=sys.argv[2]; print(json.dumps({"persist": True, "reprocessExisting": True, "limit": int(limit), "concurrency": int(conc)}))' "${limit}" "${concurrency}")"
          else
            payload='{"persist":true,"maxPages":200,"syncProducts":true}'
          fi
          
          # ============================================================================
          # HTTP REQUEST WITH RETRY AND EXPONENTIAL BACKOFF
          # ============================================================================
          call_fn_with_retry() {
            local url="$1"
            local data="$2"
            local attempt=1
            local backoff="${INITIAL_BACKOFF}"
            
            while [ "${attempt}" -le "${MAX_RETRIES}" ]; do
              log_json "debug" "Attempt ${attempt}/${MAX_RETRIES}: POST ${url}"
              
              local resp
              local curl_exit
              set +e
              resp="$(curl -sS -w '\nHTTP_STATUS:%{http_code}\n' \
                --max-time "${REQUEST_TIMEOUT}" \
                --connect-timeout 10 \
                -X POST "${url}" \
                -H "Content-Type: application/json" \
                -H "x-cron-secret: ${CRON_SECRET}" \
                --data "${data}" 2>&1)"
              curl_exit="$?"
              set -e
              
              # Parse response
              local status
              local body
              if [ "${curl_exit}" -eq 0 ]; then
                status="$(printf '%s' "${resp}" | tail -n 1 | sed 's/^HTTP_STATUS://' || echo "0")"
                body="$(printf '%s' "${resp}" | sed '$d')"
              else
                status="0"
                body="${resp}"
              fi
              
              # Check for success
              if [ "${curl_exit}" -eq 0 ] && [ "${status}" -ge 200 ] && [ "${status}" -lt 300 ]; then
                log_json "info" "Request succeeded: HTTP ${status}"
                printf '%s' "${body}"
                return 0
              fi
              
              # Log failure
              if [ "${curl_exit}" -ne 0 ]; then
                log_json "warn" "curl failed (exit ${curl_exit}): ${body:0:200}"
              else
                log_json "warn" "HTTP ${status}: ${body:0:200}"
              fi
              
              # Check if we should retry
              if [ "${attempt}" -lt "${MAX_RETRIES}" ]; then
                log_json "info" "Retrying in ${backoff}s..."
                sleep "${backoff}"
                backoff="$((backoff * 2))"
                attempt="$((attempt + 1))"
              else
                log_json "error" "All ${MAX_RETRIES} retries failed"
                if [ "${curl_exit}" -ne 0 ]; then
                  echo "FATAL: curl failed after ${MAX_RETRIES} retries (exit ${curl_exit})" >&2
                  echo "${body}" | head -c 2000 >&2
                else
                  echo "FATAL: HTTP ${status} after ${MAX_RETRIES} retries" >&2
                  echo "${body}" | head -c 2000 >&2
                fi
                return 1
              fi
            done
          }
          
          # ============================================================================
          # BATCH PROCESSING LOOP
          # ============================================================================
          batch=1
          total_count=0
          total_items=0
          
          while [ "${batch}" -le "${max_batches}" ]; do
            log_json "info" "Processing batch ${batch}/${max_batches}"
            
            # Call function with retry
            if ! body="$(call_fn_with_retry "${BASE}/bling-sync" "${payload}")"; then
              log_json "error" "Batch ${batch} failed after all retries"
              exit 1
            fi
            
            # Parse response
            summary="$(printf '%s' "${body}" | python3 -c 'import sys,json; s=sys.stdin.read(); obj=json.loads(s) if s.strip() else {}; hm="true" if bool(obj.get("hasMore", False)) else "false"; cnt=obj.get("count", 0); it=obj.get("items", 0); no=obj.get("nextOffset", ""); print(hm+"\\t"+str(cnt)+"\\t"+str(it)+"\\t"+("" if no is None else str(no)))' 2>/dev/null || printf "false\t0\t0\t")"
            
            has_more="$(printf '%s' "${summary}" | cut -f1)"
            count="$(printf '%s' "${summary}" | cut -f2)"
            items="$(printf '%s' "${summary}" | cut -f3)"
            next_offset="$(printf '%s' "${summary}" | cut -f4-)"
            
            total_count="$((total_count + count))"
            total_items="$((total_items + items))"
            
            # Structured logging
            log_batch "${batch}" "${count}" "${items}" "${has_more}" "${next_offset}"
            
            # Check if done
            if [ "${has_more}" != "true" ]; then
              log_json "info" "Sync completed successfully: total_batches=${batch}, total_count=${total_count}, total_items=${total_items}"
              exit 0
            fi
            
            batch="$((batch+1))"
            sleep 2
          done
          
          # ============================================================================
          # BACKLOG HANDLING (DO NOT FAIL)
          # ============================================================================
          if [ "${has_more:-false}" = "true" ]; then
            log_json "warn" "Backlog detected: hasMore=true after ${max_batches} batches. This is not an error - sync will continue in next run."
            log_json "info" "Partial progress: processed ${batch} batches, ${total_count} orders, ${total_items} items"
            echo "::warning::Bling sync has backlog. Processed ${batch} batches successfully. Will continue in next scheduled run."
            exit 0
          fi
          
          log_json "info" "Sync completed: total_batches=${batch}, total_count=${total_count}, total_items=${total_items}"

      - name: Notify on failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -s -X POST "$SLACK_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "{\"text\":\"⚠️ *Bling Sync falhou*\n*Workflow:* Cron Sync\n*Branch:* \`${{ github.ref_name }}\`\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|📋 Ver logs>\"}"
          fi
