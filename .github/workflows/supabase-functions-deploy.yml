name: Deploy Supabase Edge Functions

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "supabase/functions/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Cache Supabase CLI
        uses: actions/cache@v4
        with:
          path: ~/.supabase
          key: supabase-cli-${{ runner.os }}-${{ hashFiles('supabase/config.toml') }}
          restore-keys: |
            supabase-cli-${{ runner.os }}-

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate secrets
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::Secret SUPABASE_ACCESS_TOKEN não está configurado no repositório."
            exit 1
          fi
          if [ -z "$SUPABASE_PROJECT_ID" ]; then
            echo "::error::Secret SUPABASE_PROJECT_ID não está configurado no repositório."
            exit 1
          fi
          echo "✓ Secrets validados com sucesso."

      - name: Detect changed functions
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            FUNCTIONS=$(ls supabase/functions/ | tr '\n' ' ')
            echo "Trigger manual — deployando todas as funções: $FUNCTIONS"
          else
            FUNCTIONS=$(git diff --name-only HEAD~1 HEAD -- 'supabase/functions/**' \
              | grep -oP 'supabase/functions/\K[^/]+' \
              | sort -u \
              | tr '\n' ' ')
            echo "Push detectado — funções alteradas: ${FUNCTIONS:-nenhuma}"
          fi
          echo "functions=$FUNCTIONS" >> "$GITHUB_OUTPUT"

      - name: Deploy Edge Functions
        if: steps.changed.outputs.functions != ''
        run: |
          for fn in ${{ steps.changed.outputs.functions }}; do
            echo "→ Deploying $fn"
            supabase functions deploy "$fn" \
              --project-ref "$SUPABASE_PROJECT_ID"
          done

      - name: Notify failure
        if: failure()
        run: |
          echo "::error::Deploy falhou — verifique os logs acima."
          # Para notificação via Slack, configure o secret SLACK_WEBHOOK_URL e descomente:
          # curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
          #   -H "Content-Type: application/json" \
          #   -d "{\"text\":\"❌ *Deploy falhou* em \`${{ github.repository }}\` (branch: \`${{ github.ref_name }}\`)\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Ver logs>\"}"
