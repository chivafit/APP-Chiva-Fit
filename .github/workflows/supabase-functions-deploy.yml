name: Deploy Supabase Edge Functions

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "supabase/functions/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate secrets
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::Secret SUPABASE_ACCESS_TOKEN não está configurado no repositório."
            exit 1
          fi
          if [ -z "$SUPABASE_PROJECT_ID" ]; then
            echo "::error::Secret SUPABASE_PROJECT_ID não está configurado no repositório."
            exit 1
          fi
          echo "✓ Secrets validados com sucesso."

      - name: Deploy Edge Functions (sem verificação JWT)
        run: |
          for fn in bling-renew-token bling-sync bling-products-sync yampi-webhook; do
            echo "→ Deploying $fn"
            supabase functions deploy "$fn" \
              --no-verify-jwt \
              --project-ref "$SUPABASE_PROJECT_ID"
          done

      - name: Deploy Edge Functions (com verificação JWT)
        run: |
          for fn in ia-claude ia-commercial; do
            echo "→ Deploying $fn"
            supabase functions deploy "$fn" \
              --project-ref "$SUPABASE_PROJECT_ID"
          done
