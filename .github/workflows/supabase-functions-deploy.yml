name: Deploy Supabase Edge Functions

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "supabase/functions/**"

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || (secrets.SUPABASE_ACCESS_TOKEN != '' && secrets.SUPABASE_PROJECT_ID != '') }}
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate secrets
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "Missing SUPABASE_ACCESS_TOKEN secret"
            exit 1
          fi
          if [ -z "$SUPABASE_PROJECT_ID" ]; then
            echo "Missing SUPABASE_PROJECT_ID secret"
            exit 1
          fi

      - name: Deploy bling-renew-token
        run: supabase functions deploy bling-renew-token --no-verify-jwt --project-ref $SUPABASE_PROJECT_ID

      - name: Deploy bling-sync
        run: supabase functions deploy bling-sync --no-verify-jwt --project-ref $SUPABASE_PROJECT_ID

      - name: Deploy bling-products-sync
        run: supabase functions deploy bling-products-sync --no-verify-jwt --project-ref $SUPABASE_PROJECT_ID

      - name: Deploy yampi-webhook
        run: supabase functions deploy yampi-webhook --no-verify-jwt --project-ref $SUPABASE_PROJECT_ID

      - name: Deploy ia-claude
        run: supabase functions deploy ia-claude --project-ref $SUPABASE_PROJECT_ID

      - name: Deploy ia-commercial
        run: supabase functions deploy ia-commercial --project-ref $SUPABASE_PROJECT_ID
