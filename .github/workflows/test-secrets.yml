name: Test Secrets Validation

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Test secret validation
        env:
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          
          echo "Testing SUPABASE_PROJECT_ID..."
          echo "Length: ${#SUPABASE_PROJECT_ID}"
          
          if [ -z "$SUPABASE_PROJECT_ID" ]; then
            echo "::error::SUPABASE_PROJECT_ID is empty"
            exit 1
          fi
          
          if echo "$SUPABASE_PROJECT_ID" | grep -qiE 'https?://|supabase\.co'; then
            echo "::error::SUPABASE_PROJECT_ID contains URL (https:// or .supabase.co)"
            echo "Current value starts with: ${SUPABASE_PROJECT_ID:0:20}..."
            exit 1
          fi
          
          if ! echo "$SUPABASE_PROJECT_ID" | grep -qE '^[a-z0-9]{20}$'; then
            echo "::error::SUPABASE_PROJECT_ID has invalid format"
            echo "Expected: 20 lowercase alphanumeric characters"
            echo "Got length: ${#SUPABASE_PROJECT_ID}"
            echo "First 30 chars: ${SUPABASE_PROJECT_ID:0:30}"
            exit 1
          fi
          
          echo "✅ SUPABASE_PROJECT_ID is valid!"
          echo "Value: $SUPABASE_PROJECT_ID"
          
          echo ""
          echo "Testing CRON_SECRET..."
          if [ "${#CRON_SECRET}" -lt 20 ]; then
            echo "::error::CRON_SECRET is too short (${#CRON_SECRET} chars)"
            exit 1
          fi
          
          echo "✅ CRON_SECRET is valid (${#CRON_SECRET} chars)"
          echo ""
          echo "✅ All secrets validated successfully!"
