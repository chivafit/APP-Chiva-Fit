<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <meta name="theme-color" content="#0fa765" />
    <title>Login — CRM Chiva Fit</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg: #060d09;
        --surface: rgba(11, 20, 16, 0.92);
        --card: rgba(17, 26, 20, 0.88);
        --text: #f0f5f1;
        --text-2: #9dbfad;
        --text-3: #4e6e5d;
        --border: rgba(24, 38, 25, 0.9);
        --border-hi: rgba(31, 49, 36, 0.9);
        --green: #0fa765;
        --green-light: #a4e96b;
        --green-hover: #12bc72;
        --red: #f87171;
        --font: 'Plus Jakarta Sans', system-ui, sans-serif;
        --font-display: 'Playfair Display', serif;
        --mono: 'JetBrains Mono', monospace;
      }

      html { height: 100%; }

      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg);
        background-image:
          radial-gradient(700px 500px at 30% 0%, rgba(15, 167, 101, 0.12) 0%, transparent 65%),
          radial-gradient(500px 400px at 80% 100%, rgba(164, 233, 107, 0.05) 0%, transparent 60%);
        font-family: var(--font);
        color: var(--text);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow: hidden;
      }

      /* Background image */
      .login-bg {
        position: fixed;
        inset: 0;
        background-image: url('https://d2xsxph8kpxj0f.cloudfront.net/310519663418066667/ZLAADSAk7SZJ5nBybRgJRj/chiva-login-bg-9bLybzccxsDJbVAqmR9Amf.webp');
        background-size: cover;
        background-position: center;
        opacity: 0.15;
        z-index: 0;
      }

      /* Overlay gradient */
      .login-grad {
        position: fixed;
        inset: 0;
        background:
          radial-gradient(ellipse 80% 60% at 50% -5%, rgba(15, 167, 101, 0.18) 0%, transparent 60%),
          linear-gradient(180deg, rgba(6, 13, 9, 0.4) 0%, rgba(6, 13, 9, 0.85) 100%);
        z-index: 1;
      }

      /* Noise texture overlay */
      .login-noise {
        position: fixed;
        inset: 0;
        opacity: 0.025;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        background-size: 200px 200px;
        z-index: 2;
        pointer-events: none;
      }

      /* Main card */
      .login-card {
        position: relative;
        z-index: 10;
        width: 100%;
        max-width: 400px;
        margin: 0 16px;
        padding: 32px 28px 28px;
        border-radius: 24px;
        border: 1px solid rgba(24, 38, 25, 0.8);
        background: var(--surface);
        backdrop-filter: blur(24px) saturate(1.6);
        -webkit-backdrop-filter: blur(24px) saturate(1.6);
        box-shadow:
          0 0 0 1px rgba(15, 167, 101, 0.08),
          0 24px 64px rgba(0, 0, 0, 0.7),
          0 4px 16px rgba(0, 0, 0, 0.4),
          inset 0 1px 0 rgba(255, 255, 255, 0.05);
        animation: loginAppear 0.4s cubic-bezier(0, 0, 0.2, 1) both;
      }

      /* Linha de brilho no topo */
      .login-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 24px;
        right: 24px;
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(164, 233, 107, 0.5) 30%,
          rgba(15, 167, 101, 0.7) 55%,
          rgba(164, 233, 107, 0.5) 75%,
          transparent
        );
        border-radius: 1px;
      }

      @keyframes loginAppear {
        from { opacity: 0; transform: translateY(20px) scale(0.97); }
        to   { opacity: 1; transform: none; }
      }

      /* Header / logo */
      .login-header {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        margin-bottom: 28px;
      }

      .login-icon {
        width: 60px;
        height: 60px;
        border-radius: 18px;
        background: linear-gradient(145deg, var(--green-hover), var(--green));
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 14px;
        box-shadow:
          0 12px 32px rgba(15, 167, 101, 0.45),
          0 4px 12px rgba(15, 167, 101, 0.25),
          inset 0 1px 0 rgba(255, 255, 255, 0.18);
        border: 1px solid rgba(15, 167, 101, 0.35);
      }

      .login-title {
        font-size: 22px;
        font-weight: 800;
        letter-spacing: -0.6px;
        font-family: var(--font-display);
        color: var(--text);
        line-height: 1.2;
      }

      .login-sub {
        font-size: 12px;
        color: var(--text-3);
        margin-top: 5px;
        font-weight: 400;
        line-height: 1.5;
        letter-spacing: 0.1px;
      }

      /* Divider */
      .login-divider {
        border: none;
        border-top: 1px solid rgba(24, 38, 25, 0.8);
        margin: 0 0 20px;
      }

      /* Form fields */
      .login-field {
        margin-bottom: 14px;
      }

      .login-label {
        display: block;
        font-size: 10px;
        font-weight: 700;
        color: var(--text-3);
        text-transform: uppercase;
        letter-spacing: 0.9px;
        margin-bottom: 6px;
      }

      .login-input {
        width: 100%;
        padding: 10px 13px;
        border-radius: 10px;
        border: 1px solid rgba(24, 38, 25, 0.9);
        background: rgba(6, 13, 9, 0.6);
        color: var(--text);
        font-size: 12.5px;
        font-family: var(--font);
        outline: none;
        transition:
          border-color 0.15s ease,
          background 0.15s ease,
          box-shadow 0.15s ease;
        letter-spacing: -0.1px;
      }

      .login-input::placeholder {
        color: var(--text-3);
        font-weight: 400;
      }

      .login-input:hover:not(:focus) {
        border-color: rgba(31, 49, 36, 0.9);
        background: rgba(8, 16, 11, 0.7);
      }

      .login-input:focus {
        border-color: var(--green);
        box-shadow: 0 0 0 3px rgba(15, 167, 101, 0.12);
        background: rgba(6, 13, 9, 0.8);
      }

      .login-input.mono {
        font-family: var(--mono);
        font-size: 11.5px;
        letter-spacing: -0.2px;
      }

      /* Grid for two fields side by side */
      .login-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-bottom: 14px;
      }
      .login-row .login-field {
        margin-bottom: 0;
      }

      /* Section label */
      .login-section {
        font-size: 9px;
        font-weight: 700;
        color: var(--text-3);
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .login-section::after {
        content: '';
        flex: 1;
        height: 1px;
        background: rgba(24, 38, 25, 0.8);
      }

      /* Submit button */
      .login-btn {
        width: 100%;
        padding: 12px 16px;
        border-radius: 11px;
        border: none;
        background: linear-gradient(180deg, var(--green-hover) 0%, var(--green) 100%);
        color: #fff;
        font-size: 13px;
        font-weight: 600;
        font-family: var(--font);
        letter-spacing: -0.2px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 7px;
        margin-top: 8px;
        box-shadow:
          0 6px 20px rgba(15, 167, 101, 0.4),
          0 2px 6px rgba(15, 167, 101, 0.2),
          inset 0 1px 0 rgba(255, 255, 255, 0.14);
        transition:
          background 0.12s ease,
          box-shadow 0.12s ease,
          transform 0.1s ease;
      }

      .login-btn:hover:not(:disabled) {
        background: linear-gradient(180deg, #15d17f 0%, var(--green-hover) 100%);
        box-shadow:
          0 8px 28px rgba(15, 167, 101, 0.5),
          inset 0 1px 0 rgba(255, 255, 255, 0.18);
        transform: translateY(-1px);
      }

      .login-btn:active:not(:disabled) {
        transform: translateY(0) scale(0.99);
        box-shadow: 0 3px 12px rgba(15, 167, 101, 0.3);
      }

      .login-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      /* Error message */
      .login-err {
        font-size: 11px;
        color: var(--red);
        min-height: 16px;
        margin-top: 10px;
        display: flex;
        align-items: center;
        gap: 5px;
        line-height: 1.4;
      }

      /* Hint */
      .login-hint {
        margin-top: 16px;
        font-size: 10px;
        color: var(--text-3);
        text-align: center;
        line-height: 1.5;
        padding-top: 16px;
        border-top: 1px solid rgba(24, 38, 25, 0.6);
      }

      .login-hint .mono {
        font-family: var(--mono);
        font-size: 9.5px;
        color: rgba(78, 110, 93, 0.9);
        background: rgba(15, 167, 101, 0.06);
        padding: 1px 5px;
        border-radius: 4px;
        border: 1px solid rgba(15, 167, 101, 0.1);
      }

      /* Brand watermark */
      .login-brand {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 10px;
        color: rgba(78, 110, 93, 0.5);
        z-index: 10;
        letter-spacing: 0.3px;
        font-family: var(--font);
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <div class="login-bg"></div>
    <div class="login-grad"></div>
    <div class="login-noise"></div>

    <div class="login-card">
      <div class="login-header">
        <div class="login-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 3v18h18"/>
            <path d="m19 9-5 5-4-4-3 3"/>
          </svg>
        </div>
        <h1 class="login-title">Chiva Fit CRM</h1>
        <p class="login-sub">Plataforma inteligente de recompra</p>
      </div>

      <hr class="login-divider" />

      <form id="login-form">
        <p class="login-section">Configuração</p>

        <div class="login-row">
          <div class="login-field">
            <label class="login-label" for="cfg-url">Supabase URL</label>
            <input
              id="cfg-url"
              class="login-input mono"
              placeholder="https://xxxx.supabase.co"
              autocomplete="off"
            />
          </div>
          <div class="login-field">
            <label class="login-label" for="cfg-key">Anon Key</label>
            <input
              id="cfg-key"
              class="login-input mono"
              placeholder="eyJ..."
              autocomplete="off"
            />
          </div>
        </div>

        <p class="login-section">Acesso</p>

        <div class="login-field">
          <label class="login-label" for="login-email">E-mail</label>
          <input
            id="login-email"
            class="login-input"
            type="email"
            autocomplete="email"
            placeholder="admin@chivafit.com"
          />
        </div>

        <div class="login-field">
          <label class="login-label" for="login-pass">Senha</label>
          <input
            id="login-pass"
            class="login-input"
            type="password"
            autocomplete="current-password"
            placeholder="••••••••"
          />
        </div>

        <div id="login-error" class="login-err"></div>

        <button id="login-btn" class="login-btn" type="submit">
          <span>Entrar</span>
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>
          </svg>
        </button>

        <div class="login-hint">
          Abrindo via <span class="mono">file://</span>? Use um servidor local:
          <span class="mono">python3 -m http.server 8000</span>
        </div>
      </form>
    </div>

    <p class="login-brand">Chiva Fit CRM · Powered by AI</p>

    <script
      src="https://browser.sentry-cdn.com/8.28.0/bundle.min.js"
      crossorigin="anonymous"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.js"></script>
    <script type="module" src="./config.js"></script>
    <script type="module">
      // Initialize Vercel Analytics
      import { inject } from '@vercel/analytics';
      inject();
    </script>
    <script>
      // Inicializa Sentry assim que config.js estiver disponível
      (function () {
        var dsn = window.APP_CONFIG && window.APP_CONFIG.sentryDsn;
        if (dsn && typeof window.Sentry !== 'undefined') {
          window.Sentry.init({
            dsn: dsn,
            environment:
              location.hostname === 'localhost' || location.hostname === '127.0.0.1'
                ? 'development'
                : 'production',
            release: 'crm-chivafit@20260317',
            tracesSampleRate: 0.05,
          });
        }
      })();
    </script>
    <script type="module">
      import { getSupabaseSession, signInWithEmailPassword } from './supabaseClient.js';

      (async function () {
        const elUrl = document.getElementById('cfg-url');
        const elKey = document.getElementById('cfg-key');
        const elEmail = document.getElementById('login-email');
        const elPass = document.getElementById('login-pass');
        const elErr = document.getElementById('login-error');
        const elBtn = document.getElementById('login-btn');

        function readLS(key) {
          try {
            return String(localStorage.getItem(key) || '');
          } catch (_e) {
            return '';
          }
        }

        function saveConfig(url, key) {
          try {
            localStorage.setItem('crm_supa_url', String(url || '').trim());
            localStorage.setItem('crm_supa_key', String(key || '').trim());
          } catch (_e) {}
        }

        function getConfig() {
          const url = String(
            elUrl?.value ||
              window.APP_CONFIG?.supabaseUrl ||
              readLS('crm_supa_url') ||
              readLS('supabase_url') ||
              '',
          ).trim();
          const key = String(
            elKey?.value ||
              window.APP_CONFIG?.supabaseAnonKey ||
              readLS('crm_supa_key') ||
              readLS('supabase_key') ||
              '',
          ).trim();
          return { url, key };
        }

        async function maybeRedirectIfLogged() {
          const { url, key } = getConfig();
          if (!url || !key) return;
          const session = await getSupabaseSession(url, key);
          if (session?.access_token) {
            window.location.replace('./index.html');
          }
        }

        elUrl.value = String(
          window.APP_CONFIG?.supabaseUrl || readLS('crm_supa_url') || readLS('supabase_url') || '',
        ).trim();
        elKey.value = String(
          window.APP_CONFIG?.supabaseAnonKey ||
            readLS('crm_supa_key') ||
            readLS('supabase_key') ||
            '',
        ).trim();
        elEmail.value = 'admin@chivafit.com';
        await maybeRedirectIfLogged();

        document.getElementById('login-form').addEventListener('submit', async (e) => {
          e.preventDefault();
          elErr.textContent = '';

          if (!window.isSecureContext) {
            elErr.textContent =
              'Este login precisa de HTTPS (ou servidor local). Evite abrir via file://';
            return;
          }

          const { url, key } = getConfig();
          if (!url || !key) {
            elErr.textContent = 'Informe Supabase URL e anon key.';
            return;
          }

          const email = String(elEmail.value || '').trim();
          const pass = String(elPass.value || '');
          if (!email || !pass) {
            elErr.textContent = 'Informe e-mail e senha.';
            return;
          }

          saveConfig(url, key);

          try {
            elBtn.disabled = true;
            elBtn.innerHTML = '<span>Entrando...</span>';
            await signInWithEmailPassword(url, key, email, pass);
            window.location.replace('./index.html');
          } catch (err) {
            elErr.textContent = String(err?.message || String(err) || 'Falha no login.');
          } finally {
            elBtn.disabled = false;
            elBtn.innerHTML = '<span>Entrar</span><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>';
          }
        });
      })();
    </script>
  </body>
</html>
